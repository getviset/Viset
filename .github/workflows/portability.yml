name: Portability

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-aot:
    name: ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-24.04
            executable: viset
            capture_smoke: true
          - rid: linux-arm64
            runner: ubuntu-24.04-arm
            executable: viset
            capture_smoke: false
          - rid: win-x64
            runner: windows-2025
            executable: viset.exe
            capture_smoke: false
          - rid: win-arm64
            runner: windows-11-arm
            executable: viset.exe
            capture_smoke: false
          - rid: osx-arm64
            runner: macos-15
            executable: viset
            capture_smoke: false

    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Restore locked dependencies
        run: dotnet restore Viset.slnx --locked-mode

      - name: Publish Native AOT
        shell: bash
        run: |
          set -o pipefail
          dotnet publish src/Viset/Viset.fsproj \
            --configuration Release \
            --runtime "${{ matrix.rid }}" \
            --no-restore \
            2>&1 | tee "publish-${{ matrix.rid }}.log"

      - name: Check Native AOT diagnostics
        run: python .config/verify-aot-log.py "publish-${{ matrix.rid }}.log"

      - name: Check Native AOT executable
        shell: bash
        run: |
          binary="src/Viset/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.executable }}"
          test "$("$binary" --version)" = "viset 0.1.0"
          "$binary" --help | grep -Fq "viset capture CAPTURE.lua"

      - name: Check Native AOT sidecars
        run: >-
          python .config/verify-native-sidecars.py
          "src/Viset/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.executable }}"

      - name: Capture smoke
        if: matrix.capture_smoke
        shell: bash
        run: |
          VISET_END_TO_END_BINARY="$PWD/src/Viset/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.executable }}" \
          VISET_END_TO_END_BROWSER_ARGUMENTS=--no-sandbox \
            dotnet test tests/Viset.EndToEnd/Viset.EndToEnd.fsproj \
              --configuration Release \
              --no-restore \
              --filter TestCategory=Smoke
