name: Portability

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-aot:
    name: ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-24.04
            portable_linux: true
            capture_smoke: true
          - rid: linux-arm64
            runner: ubuntu-24.04-arm
            portable_linux: true
            capture_smoke: false
          - rid: win-x64
            runner: windows-2025
            portable_linux: false
            capture_smoke: false
          - rid: win-arm64
            runner: windows-11-arm
            portable_linux: false
            capture_smoke: false
          - rid: osx-arm64
            runner: macos-15
            portable_linux: false
            capture_smoke: false

    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Restore locked dependencies
        run: dotnet restore Viset.slnx --locked-mode

      - name: Publish Native AOT
        shell: bash
        run: |
          set -o pipefail
          dotnet publish src/Viset/Viset.fsproj \
            --configuration Release \
            --runtime "${{ matrix.rid }}" \
            --no-restore \
            2>&1 | tee "publish-${{ matrix.rid }}.log"

      - name: Check Native AOT diagnostics
        run: python acceptance/verify-aot-log.py "publish-${{ matrix.rid }}.log"

      - name: Stage portable payload
        run: >-
          python scripts/publish/stage.py
          --rid "${{ matrix.rid }}"
          --publish-directory "src/Viset/bin/Release/net10.0/${{ matrix.rid }}/publish"
          --destination "artifacts/${{ matrix.rid }}"

      - name: Qualify native payload
        shell: bash
        run: |
          arguments=(
            --rid "${{ matrix.rid }}"
            --directory "artifacts/${{ matrix.rid }}"
          )
          if [[ "${{ matrix.portable_linux }}" == "true" ]]; then
            arguments+=(--require-portable-linux)
          fi
          python scripts/publish/qualify.py "${arguments[@]}"

      - name: Capture smoke
        if: matrix.capture_smoke
        run: python acceptance/smoke-capture.py "artifacts/${{ matrix.rid }}/viset"

      - name: Upload qualified payload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: viset-${{ matrix.rid }}
          path: artifacts/${{ matrix.rid }}
          if-no-files-found: error
