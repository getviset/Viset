<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Viset fixture</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: transparent;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
        font-family: sans-serif;
      }

      #card {
        width: 180px;
        height: 100px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        color: white;
        font-size: 24px;
        font-weight: 700;
        box-shadow: 0 16px 32px rgb(0 0 0 / 25%);
        transform: translateX(var(--offset, 0));
      }
    </style>
  </head>
  <body>
    <div id="card">fixture</div>
    <script>
      const card = document.querySelector("#card");
      window.fixture = {
        setView(view, progress) {
          const colours = {
            red: [214, 56, 74],
            blue: [50, 104, 220],
            motion: [95 + Math.round(progress * 100), 70, 190],
          };
          const colour = colours[view];
          card.style.background = `rgb(${colour.join(",")})`;
          card.style.setProperty("--offset", `${Math.round((progress - 0.5) * 50)}px`);
          card.textContent = view;
          document.body.dataset.view = view;
        },
      };
    </script>
  </body>
</html>
